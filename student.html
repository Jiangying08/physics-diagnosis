// ===== GitHub 鑷姩鍚屾锛堜緷璧?config.js 涓殑 GH_TOKEN锛?=====
const GITHUB = {
  token: typeof GH_TOKEN !== 'undefined' ? GH_TOKEN : '',
  repo: 'Jiangying08/physics-diagnosis',
  label: 'student-result'
};

function submitToGitHub(data) {
  if (!GITHUB.token) {
    console.warn('GitHub鍚屾: 鏈厤缃甌oken');
    return;
  }
  const title = `[璇婃柇缁撴灉] ${data.n} - ${data.d}`;
  const body = JSON.stringify(data);
  fetch(`https://api.github.com/repos/${GITHUB.repo}/issues`, {
    method: 'POST',
    headers: {
      'Authorization': `token ${GITHUB.token}`,
      'Content-Type': 'application/json',
    },
    body: JSON.stringify({ title, body, labels: [GITHUB.label] })
  }).then(res => {
    if (res.ok) {
      console.log('鉁?宸插悓姝ュ埌鏁欏笀绔?);
      // 鍦ㄥ垎浜爜鍖哄煙鏄剧ず鍚屾鎴愬姛鏍囪
      const el = document.getElementById('syncStatus');
      if (el) el.textContent = '鉁?宸插悓姝?;
    } else {
      console.warn('GitHub鍚屾澶辫触:', res.status);
    }
  }).catch(e => console.warn('GitHub鍚屾寮傚父:', e));
}

const state={q:0,ans:Array(12).fill(null),name:''};
const $=id=>document.getElementById(id);

function show(id){
  document.querySelectorAll('.page').forEach(p=>{p.classList.remove('active');p.style.display='none'});
  const el=$(id);if(el){el.style.display='';el.classList.add('active')}
}

function startQuiz(){
  const n=$('studentName').value.trim();
  if(!n){$('studentName').focus();$('studentName').style.borderColor='#FC8181';setTimeout(()=>$('studentName').style.borderColor='#E2E8F0',1500);return}
  state.name=n;state.q=0;state.ans=Array(12).fill(null);show('quiz');renderQ()
}

function renderQ(){
  const idx=state.q,q=QUESTIONS[idx],dim=DIMS.find(d=>d.key===q.dim);
  $('qNum').textContent=`绗?${idx+1} / 12 棰榒;$('pFill').style.width=`${(idx/12)*100}%`;
  $('qDim').textContent=`${dim.icon} ${dim.label}`;$('qDim').style.background=dim.color;
  const sel=state.ans[idx];
  $('qArea').innerHTML=`<div class="q-text">${q.text}</div><div class="opts">${q.opts.map((o,i)=>`<div class="opt ${sel===i?'sel':''}" onclick="pick(${i})"><div class="dot"></div><span class="lb2">${o.label}.</span><span>${o.text}</span></div>`).join('')}</div>`;
  const prev=$('prevBtn');prev.style.visibility=idx===0?'hidden':'visible';
  if(idx<11){$('nextBtn').style.display='';$('subBtn').style.display='none';const nb=$('nextBtn');nb.disabled=false;nb.style.opacity=1}
  else{$('nextBtn').style.display='none';$('subBtn').style.display='';const sb=$('subBtn');sb.disabled=sel===null;sb.style.opacity=sel===null?.5:1}
  $('quizInner').scrollTop=0
}
function pick(i){
  state.ans[state.q]=i;renderQ();
  if(state.q<11){setTimeout(()=>goQ(state.q+1),350)}
}
function goQ(i){if(i<0||i>11)return;state.q=i;renderQ()}

function submitQuiz(){
  if(state.ans[state.q]===null)return;
  const fi=state.ans.indexOf(null);if(fi!==-1){state.q=fi;renderQ();return}
  show('loading');
  const msgs=['姝ｅ湪鍒嗘瀽浣犵殑绛旈鎯呭喌','璁＄畻鍚勭淮搴﹀緱鍒?,'鍖归厤鐗╃悊瀛︿範绫诲瀷','鐢熸垚涓撳睘瀛︿範鎶ュ憡'];
  let mi=0;const iv=setInterval(()=>{$('loadMsg').textContent=msgs[mi=(mi+1)%msgs.length]},700);
  setTimeout(()=>{clearInterval(iv);compute();show('result');$('result').scrollTop=0},1500)
}

function compute(){
  const raw={};DIMS.forEach(d=>{raw[d.key]={v:0,cnt:0}});
  QUESTIONS.forEach((q,i)=>{const a=state.ans[i];if(a===null)return;if(raw[q.dim]){raw[q.dim].v+=q.opts[a].score;raw[q.dim].cnt+=3}});
  const scores={};DIMS.forEach(d=>{const c=raw[d.key].cnt;scores[d.key]=c>0?Math.round(Math.max(0,Math.min(100,(raw[d.key].v/c)*100))):0});
  const tk=detType(scores);const t=TYPES[tk];
  const ws=[];QUESTIONS.forEach((q,i)=>{const a=state.ans[i];if(a===null)return;const op=q.opts[a];if(op.score<3&&op.weakness)ws.push([i,a])});
  const sa=DIMS.map(d=>scores[d.key]);
  const shareData={n:state.name,s:sa,t:tk,d:new Date().toLocaleDateString('zh-CN'),w:ws};
  const code=btoa(encodeURIComponent(JSON.stringify(shareData)));
  $('shareCode').textContent=code;
  // 鑷姩鍚屾鍒版暀甯堢
  submitToGitHub(shareData);
  $('rEmoji').textContent=t.emoji;$('rName').textContent=t.name;$('rSlogan').textContent=t.slogan;
  $('rStrength').innerHTML=t.strength.map(s=>`<div class="sw-item s"><div class="swt">鉁?${s.t}</div><div class="swd">${s.d}</div></div>`).join('');
  $('rWeakness').innerHTML=t.weakness.map(s=>`<div class="sw-item w"><div class="swt">馃搶 ${s.t}</div><div class="swd">${s.d}</div></div>`).join('');
  $('rTodo').innerHTML=t.todo.map(s=>`<div class="todo-item"><div class="tt">${s.t}</div><div class="td">${s.d}</div><span class="tl">馃幆 ${s.target}</span></div>`).join('');
  $('dimScoresList').innerHTML=DIMS.map(d=>{const lvl=scores[d.key]>=68?'浼樺娍':(scores[d.key]>=40?'涓瓑':'钖勫急');const lc=scores[d.key]>=68?'#48BB78':(scores[d.key]>=40?'#ED8936':'#FC8181');return `<div class="di"><div class="di-h"><span>${d.icon} ${d.label}</span><span>${scores[d.key]}鍒?<span style="color:${lc};font-size:11px;font-weight:400">${lvl}</span></span></div><div class="di-b"><div class="di-f" style="width:${scores[d.key]}%;background:${d.color}"></div></div></div>`}).join('');
  drawRadar(scores)
}
function detType(s){const {concept,model,math,reading,flexible}=s;const avg=(concept+model+math+reading+flexible)/5;if(avg<45)return'E';if(flexible>=60&&concept<=flexible-15&&model<=flexible-15)return'C';if(concept>=55&&model>=55&&concept+model>=120&&reading<=concept-10)return'A';if(math>=55&&reading>=55&&math+reading>=120&&flexible<=math-10)return'B';if(math>=50&&concept<=math-15)return'D';if(concept>=50&&model>=50&&concept+model>=math+reading+flexible)return'A';if(math>=50&&reading>=50)return'B';if(flexible>=55)return'C';if(math>=Math.max(concept,model,reading,flexible))return'D';if(avg<55)return'E';return'A'}
function drawRadar(scores){const c=$('radarChart');if(!c)return;const ctx=c.getContext('2d');const W=c.width,H=c.height,cx=W/2,cy=H/2,R=85,LV=4,n=DIMS.length,SA=-Math.PI/2,AS=2*Math.PI/n;ctx.clearRect(0,0,W,H);for(let l=1;l<=LV;l++){const r=R/LV*l;ctx.beginPath();for(let i=0;i<=n;i++){const a=SA+i*AS;l==1?ctx.moveTo(cx+r*Math.cos(a),cy+r*Math.sin(a)):ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a))}ctx.closePath();ctx.strokeStyle='#E2E8F0';ctx.lineWidth=1;ctx.stroke()}for(let i=0;i<n;i++){const a=SA+i*AS;ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+R*Math.cos(a),cy+R*Math.sin(a));ctx.strokeStyle='#E2E8F0';ctx.lineWidth=1;ctx.stroke()}ctx.beginPath();for(let i=0;i<=n;i++){const idx=i%n,d=DIMS[idx],v=Math.max(0,Math.min(1,scores[d.key]/100)),r=R*v,a=SA+idx*AS;i===0?ctx.moveTo(cx+r*Math.cos(a),cy+r*Math.sin(a)):ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a))}ctx.closePath();ctx.fillStyle='rgba(66,153,225,.12)';ctx.fill();ctx.strokeStyle='rgba(43,108,176,.5)';ctx.lineWidth=2;ctx.stroke();for(let i=0;i<n;i++){const d=DIMS[i],v=Math.max(0,Math.min(1,scores[d.key]/100)),r=R*v,a=SA+i*AS;ctx.beginPath();ctx.arc(cx+r*Math.cos(a),cy+r*Math.sin(a),3,0,2*Math.PI);ctx.fillStyle=d.color;ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke()}ctx.textAlign='center';ctx.textBaseline='middle';for(let i=0;i<n;i++){const d=DIMS[i],a=SA+i*AS,lr=R+18;ctx.font='bold 11px -apple-system,"PingFang SC","Microsoft YaHei",sans-serif';ctx.fillStyle=d.color;ctx.fillText(d.label,cx+lr*Math.cos(a),cy+lr*Math.sin(a))}}
function copyCode(){
  const code=$('shareCode').textContent;
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(code).then(()=>flashCopy()).catch(()=>fallbackCopy(code))
  }else{fallbackCopy(code)}
}
function flashCopy(){const o=$('shareCode').textContent;$('shareCode').textContent='鉁?宸插鍒讹紒';setTimeout(()=>{$('shareCode').textContent=o},1200)}
function fallbackCopy(c){const ta=document.createElement('textarea');ta.value=c;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);flashCopy()}
function restart(){if(confirm('纭畾閲嶆柊娴嬭瘯鍚楋紵')){state.ans=Array(12).fill(null);state.q=0;show('welcome')}}
document.addEventListener('keydown',e=>{if(!document.querySelector('#quiz.active'))return;if(e.key==='ArrowRight'||e.key==='Enter'){if(state.q<11)goQ(state.q+1);else if(state.ans[state.q]!==null)submitQuiz()}if(e.key==='ArrowLeft')goQ(state.q-1);if(e.key>='1'&&e.key<='4'){const i=parseInt(e.key)-1;if(i<QUESTIONS[state.q].opts.length)pick(i)}});
</script>
