<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👩‍🏫 物理诊断 · 教师管理平台</title>
<script src="config.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#F7FAFC;color:#2D3748;min-height:100vh}
.header{background:linear-gradient(135deg,#2B6CB0,#4299E1);color:#fff;padding:16px 24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.header h1{font-size:20px;font-weight:800;display:flex;align-items:center;gap:8px}
.header .ha{display:flex;gap:8px;flex-wrap:wrap}
.main{max-width:1100px;margin:0 auto;padding:20px 16px}

.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-white{background:#fff;color:#2B6CB0}
.btn-white:hover{background:#EBF4FF}
.btn-primary{background:#2B6CB0;color:#fff}
.btn-primary:hover{background:#2C5282}
.btn-ghost{background:#fff;color:#4A5568;border:1px solid #E2E8F0;padding:6px 14px;font-size:12px;border-radius:6px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .2s}
.btn-ghost:hover{background:#F7FAFC}
.btn-sm{padding:6px 14px;font-size:12px;border-radius:6px}

.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:18px}
.sc{background:#fff;border-radius:10px;padding:12px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.sc .sv{font-size:26px;font-weight:800}
.sc .sl{font-size:12px;color:#718096;margin-top:2px}
.stype-d{font-size:13px;color:#718096}

.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.toolbar .ff{font-size:13px;font-weight:600;color:#4A5568}
.toolbar input{border:2px solid #E2E8F0;border-radius:8px;padding:7px 12px;font-size:13px;width:200px;outline:none}
.toolbar input:focus{border-color:#4299E1}

.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.fb{padding:4px 14px;border-radius:14px;border:1px solid #E2E8F0;background:#fff;font-size:12px;font-weight:600;cursor:pointer;color:#4A5568;transition:all .2s}
.fb:hover{border-color:#90CDF4;color:#2B6CB0}
.fb.active{background:#2B6CB0;color:#fff;border-color:#2B6CB0}

.stu-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:10px}
.scard{background:#fff;border-radius:10px;padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.04);cursor:pointer;transition:all .2s;border:2px solid transparent;position:relative}
.scard:hover{border-color:#90CDF4;transform:translateY(-2px)}
.scard .st{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.scard .sn{font-size:16px;font-weight:700}
.scard .stype{font-size:11px;padding:2px 10px;border-radius:8px;color:#fff;font-weight:600}
.scard .sd{font-size:11px;color:#A0AEC0;margin-bottom:6px}
.scard .sbar{display:flex;gap:3px}
.scard .sdot{width:26px;height:6px;border-radius:2px;flex-shrink:0}
.scard .sdel{position:absolute;top:8px;right:8px;width:22px;height:22px;border-radius:50%;border:none;background:transparent;color:#CBD5E0;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center}
.scard .sdel:hover{background:#FED7D7;color:#FC8181}

.empty-state{text-align:center;padding:50px 20px;color:#A0AEC0;grid-column:1/-1}
.empty-state .big{font-size:44px;margin-bottom:10px}
.empty-state p{font-size:15px}

/* 导入弹窗 */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:1000;justify-content:center;align-items:center;padding:16px;animation:fadeIn .2s}
.modal-overlay.active{display:flex}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:#fff;border-radius:14px;padding:0;width:100%;max-width:500px;max-height:90vh;display:flex;flex-direction:column;animation:slideUp .25s}
@keyframes slideUp{from{transform:translateY(24px);opacity:0}to{transform:translateY(0);opacity:1}}
.mhdr{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;border-bottom:1px solid #E2E8F0}
.mhdr h3{font-size:16px;display:flex;align-items:center;gap:6px}
.mclose{width:28px;height:28px;border-radius:50%;border:none;background:transparent;font-size:18px;cursor:pointer;color:#A0AEC0;display:flex;align-items:center;justify-content:center}
.mclose:hover{background:#EDF2F7;color:#4A5568}
.mb{overflow-y:auto;padding:20px}
.import-area{text-align:center}
.import-area textarea{width:100%;max-width:380px;height:60px;padding:10px;border:2px solid #E2E8F0;border-radius:10px;font-size:16px;text-align:center;outline:none;font-family:monospace;resize:none}
.import-area textarea:focus{border-color:#4299E1}
.import-area .or{font-size:13px;color:#A0AEC0;margin:12px 0}
.import-area .btn{margin-top:6px}
.fu{position:relative;display:inline-block}
.fu input[type=file]{position:absolute;top:0;left:0;width:100%;height:100%;opacity:0;cursor:pointer}
.import-success{border-radius:8px;padding:20px;text-align:center;background:#F0FFF4;border:1px solid #C6F6D5}
.import-success .big{font-size:40px;margin-bottom:6px}
.import-success .nm{font-size:18px;font-weight:700}
.import-success .tp{font-size:14px;color:#718096;margin-bottom:8px}

/* 报告弹窗（教师版完整报告） */
.modal-wide{max-width:900px}
.report-inner{max-width:800px;margin:0 auto}

/* 报告头部 */
.report-header{
  background:linear-gradient(135deg,#2B6CB0,#48BB78);
  border-radius:14px;padding:24px 24px 20px;margin-bottom:14px;
  color:#fff;position:relative;overflow:hidden
}
.report-header::after{
  content:'🔬';position:absolute;right:20px;top:50%;transform:translateY(-50%);
  font-size:60px;opacity:.15
}
.report-header .rh-name{font-size:22px;font-weight:800;margin-bottom:4px}
.report-header .rh-meta{font-size:13px;opacity:.9;line-height:1.6}
.report-header .rh-meta .rh-type{
  display:inline-block;background:rgba(255,255,255,.2);padding:1px 12px;
  border-radius:12px;font-weight:600;margin-right:6px
}
.report-header .rh-score{
  display:inline-block;margin-top:8px;background:rgba(255,255,255,.15);
  padding:6px 16px;border-radius:20px;font-size:14px;font-weight:700
}
.report-header .rh-score span{font-size:28px;margin-right:4px}

/* 报告卡片 */
.rs{
  border-radius:12px;padding:18px 20px;margin-bottom:12px;
  background:#fff;border:1px solid #EDF2F7;
  box-shadow:0 1px 4px rgba(0,0,0,.03)
}
.rs h4{
  font-size:13px;font-weight:700;margin-bottom:10px;
  display:flex;align-items:center;gap:6px;color:#1A202C;
  padding-bottom:8px;border-bottom:1px solid #F7FAFC
}
.rs .rs-body{font-size:13px;line-height:1.8;color:#4A5568}

/* 维度条 */
.di-group{display:flex;flex-direction:column;gap:8px}
.di{margin-bottom:0}
.di-h{display:flex;justify-content:space-between;align-items:center;font-size:12px;font-weight:600;margin-bottom:3px;color:#2D3748}
.di-h .di-label{display:flex;align-items:center;gap:4px}
.di-h .di-val{display:flex;align-items:center;gap:4px}
.di-h .di-lvl{font-size:10px;font-weight:600;padding:1px 8px;border-radius:8px}
.di-b{height:8px;background:#EDF2F7;border-radius:4px;overflow:hidden}
.di-f{height:100%;border-radius:4px;transition:width 1s}
.dim-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.dim-tags .dt{
  font-size:11px;padding:3px 10px;border-radius:8px;
  font-weight:600;color:#fff
}

/* 弱点分析表 */
.wt-wrap{border-radius:8px;overflow:hidden;border:1px solid #EDF2F7}
.wt{width:100%;border-collapse:collapse;font-size:12px}
.wt th{
  text-align:left;padding:8px 10px;background:#F7FAFC;
  font-weight:700;color:#4A5568;font-size:11px;
  border-bottom:2px solid #E2E8F0
}
.wt td{padding:8px 10px;border-bottom:1px solid #F7FAFC;vertical-align:top}
.wt tr:last-child td{border-bottom:none}
.wt .qt2{color:#2D3748;font-weight:600;font-size:12px}
.wt .qt-wrong{font-size:11px;color:#FC8181;margin-top:2px;font-weight:500}
.wt .wb{color:#718096;line-height:1.6;font-size:12px}
.badge{display:inline-block;padding:2px 8px;border-radius:5px;font-size:10px;font-weight:600;color:#fff}
.wt-empty{padding:20px;text-align:center;color:#48BB78;font-weight:600;font-size:13px}

/* 教学方案网格 */
.pg2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pi{
  background:#F7FAFC;border-radius:8px;padding:10px 12px;
  border-left:3px solid #4299E1
}
.pi h5{font-size:12px;font-weight:700;margin-bottom:3px;color:#1A202C}
.pi p{font-size:11px;color:#4A5568;line-height:1.6}

/* 预警框 */
.warn-box{
  background:#FFFAF0;border:1px solid #FEEBC8;
  border-radius:8px;padding:12px 14px;margin-top:10px
}
.warn-box .wtt{font-weight:700;font-size:12px;color:#7B5E2E;margin-bottom:3px}
.warn-box p{font-size:12px;color:#7B5E2E;line-height:1.6}

/* 操作栏 */
.act-bar-report{
  display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:8px
}

@media(max-width:640px){
  .header h1{font-size:17px}
  .header{padding:12px 16px}
  .stats{grid-template-columns:repeat(2,1fr)}
  .stu-list{grid-template-columns:1fr}
  .pg2{grid-template-columns:1fr}
  .toolbar input{width:140px}
  .modal{padding:0;border-radius:0;max-height:100vh}
  .mb{padding:12px}
  .report-inner{max-width:100%;padding:0;overflow:hidden}
  .report-header{padding:16px;border-radius:0}
  .report-header .rh-name{font-size:17px}
  .report-header .rh-score{font-size:12px}
  .report-header .rh-score span{font-size:20px}
  .rs{padding:12px 14px;border-radius:8px}
  .rs h4{font-size:12px}
  .rs .rs-body{font-size:12px}
  .dim-tags{gap:4px}
  .dim-tags .dt{font-size:10px;padding:2px 6px}
  .di-h{font-size:11px}
  .wt{font-size:11px}
  .wt th,.wt td{padding:5px 6px}
  .wt .qt2{font-size:11px}
  .pg2{gap:6px}
  .pi{padding:8px 10px}
  .pi h5{font-size:11px}
  .pi p{font-size:10px}
  .warn-box{padding:10px}
  .mhdr{padding:10px 14px}
  .mhdr h3{font-size:14px}
  .scard{padding:10px 12px}
  .scard .sn{font-size:14px}
  .act-bar-report{gap:4px}
}

/* 打印样式 */
@media print{
  @page{margin:12mm 15mm}
  body{background:#fff!important;overflow:visible!important}
  .header,.toolbar,.filter-row,.stats,.stu-list,.mhdr,.mclose,.act-bar-report{display:none!important}
  .modal-overlay{position:static!important;background:none!important;display:block!important;padding:0!important;overflow:visible!important}
  .modal{max-width:100%!important;max-height:none!important;box-shadow:none!important;border-radius:0!important;overflow:visible!important;animation:none!important}
  .mb{overflow:visible!important;padding:0!important}
  .report-inner{max-width:100%!important}
  .report-header{break-inside:avoid;page-break-after:avoid;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .report-header::after{display:none}
  .rs{box-shadow:none!important;border:1px solid #E2E8F0!important;break-inside:avoid;page-break-inside:avoid;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .warn-box{break-inside:avoid}
  .pg2{grid-template-columns:1fr 1fr}
  .di-f{transition:none!important}
  .di-b,.dim-tags .dt,.badge{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .wt td,.wt th{padding:5px 8px;font-size:10px}
  .wt th{background:#F7FAFC!important}
}
</style>
</head>
<body>

<div class="header">
  <h1>👩‍🏫 物理诊断 · 教师管理平台</h1>
  <div class="ha">
    <button class="btn btn-white" onclick="showImport()">📥 导入学生</button>
    <button class="btn btn-white" onclick="exportAll()">📤 导出全部</button>
    <button class="btn btn-white" onclick="document.getElementById('fileInput').click()">📂 导入备份</button>
    <button class="btn btn-white" id="syncBtn" onclick="syncFromGitHub()">🔄 同步云端</button>
    <span id="syncStatus" style="font-size:12px;color:#A0AEC0;margin-left:4px"></span>
    <input type="file" id="fileInput" accept=".json" style="display:none" onchange="importFile(event)">
  </div>
</div>

<div class="main">
  <div class="stats" id="statsArea">
    <div class="sc"><div class="sv" id="tCount" style="color:#2B6CB0">0</div><div class="sl">📚 学生总数</div></div>
    <div class="sc"><div class="sv" id="tAvg" style="color:#48BB78">—</div><div class="sl">📊 平均综合分</div></div>
    <div class="sc"><div class="sv" style="color:#9F7AEA;font-size:15px" id="tDist">暂无</div><div class="sl">🔤 类型分布</div></div>
  </div>

  <div class="filter-row">
    <span class="ff">筛选：</span>
    <button class="fb active" onclick="setFilter('all',this)">全部</button>
    <button class="fb" onclick="setFilter('A',this)">🔮 A 直觉建构者</button>
    <button class="fb" onclick="setFilter('B',this)">📋 B 规范执行者</button>
    <button class="fb" onclick="setFilter('C',this)">⚡ C 快速扫描者</button>
    <button class="fb" onclick="setFilter('D',this)">📝 D 记忆驱动者</button>
    <button class="fb" onclick="setFilter('E',this)">🌱 E 缓慢建构者</button>
  </div>

  <div class="stu-list" id="studentList">
    <div class="empty-state"><div class="big">📥</div><p>还没有学生数据<br>点击上方「导入学生」添加学生的分享码</p></div>
  </div>
</div>

<!-- 导入弹窗 -->
<div class="modal-overlay" id="importModal">
  <div class="modal">
    <div class="mhdr"><h3>📥 导入学生数据</h3><button class="mclose" onclick="closeModal('importModal')">✕</button></div>
    <div class="mb">
      <div class="import-area" id="importAreaDefault">
        <p style="font-size:14px;color:#4A5568;margin-bottom:10px">粘贴学生分享码</p>
        <textarea id="codeInput" placeholder="粘贴学生发来的分享码" onkeydown="if(event.key==='Enter'){event.preventDefault();importCode()}"></textarea>
        <button class="btn btn-primary" onclick="importCode()" style="margin-top:4px">导入</button>
        <div class="or">— 或 —</div>
        <div class="fu"><button class="btn btn-primary">📂 上传 JSON 文件</button><input type="file" accept=".json" onchange="handleFile(event)"></div>
      </div>
      <div class="import-success" id="importSuccess" style="display:none">
        <div class="big">✅</div>
        <div class="nm" id="importName">张三</div>
        <div class="tp" id="importType">直觉建构者 · 综合 72 分</div>
        <button class="btn btn-primary btn-sm" onclick="document.getElementById('importModal').classList.remove('active');document.getElementById('importAreaDefault').style.display='';document.getElementById('importSuccess').style.display='none';document.getElementById('codeInput').value=''">继续导入</button>
        <button class="btn btn-sm" style="border:1px solid #E2E8F0;background:#fff;margin-left:6px;padding:6px 14px;font-size:12px;border-radius:6px;cursor:pointer" onclick="document.getElementById('importModal').classList.remove('active');document.getElementById('importAreaDefault').style.display='';document.getElementById('importSuccess').style.display='none';document.getElementById('codeInput').value=''">完成</button>
      </div>
    </div>
  </div>
</div>

<!-- 教师报告弹窗 -->
<div class="modal-overlay" id="reportModal">
  <div class="modal modal-wide">
    <div class="mhdr"><h3 id="reportTitle">🔬 学生诊断报告</h3><button class="mclose" onclick="closeModal('reportModal')">✕</button></div>
    <div class="mb" id="reportBody"></div>
  </div>
</div>

<script>
const DIMS=[
  {key:'concept',label:'概念理解',color:'#4299E1',icon:'🧠'},
  {key:'model',label:'模型建构',color:'#48BB78',icon:'🔧'},
  {key:'math',label:'数学运用',color:'#ED8936',icon:'📐'},
  {key:'reading',label:'审题习惯',color:'#9F7AEA',icon:'🔍'},
  {key:'flexible',label:'思维灵活',color:'#FC8181',icon:'💡'},
];
const TYPES={A:{n:'直觉建构者',e:'🔮',c:'#4299E1'},B:{n:'规范执行者',e:'📋',c:'#48BB78'},C:{n:'快速扫描者',e:'⚡',c:'#ED8936'},D:{n:'记忆驱动者',e:'📝',c:'#9F7AEA'},E:{n:'缓慢建构者',e:'🌱',c:'#FC8181'}};
const QUESTIONS=[
  {dim:'concept',text:'🎧 你和同桌一起听歌一人戴一只耳机，同桌能听到你耳机里的声音吗？',opts:[{label:'A',text:'不能——耳机声音很小只有自己能听到'},{label:'B',text:'能听到一点点——耳机振膜振动带动空气传开'},{label:'C',text:'不能——耳机线把声音都传到耳朵里了'},{label:'D',text:'能听到——耳机线会导电把声音传过去'}]},
  {dim:'concept',text:'🥤 夏天从冰箱拿出冰可乐放桌上，一会儿瓶壁外面出现一层小水珠。这水珠从哪来的？',opts:[{label:'A',text:'冰箱里冰霜附在瓶子上带出来了'},{label:'B',text:'空气中的水蒸气遇冷液化'},{label:'C',text:'瓶子漏了可乐渗出来了'},{label:'D',text:'空气中的水被冰可乐冻出来了'}]},
  {dim:'concept',text:'📸 你用手机后置摄像头拍远处，镜头里像是倒的，但照片里是正的。为什么？',opts:[{label:'A',text:'手机摄像头不是凸透镜'},{label:'B',text:'凸透镜成倒立实像，软件自动翻转'},{label:'C',text:'拍远处倒立，拍近处正立'},{label:'D',text:'眼睛看到正摄像头拍到也是正'}]},
  {dim:'model',text:'🚌 你坐公交站着玩手机没扶扶手，司机急刹车，你整个人向前倾。这是因为：',opts:[{label:'A',text:'刹车时车产生向前的推力'},{label:'B',text:'惯性——车减速，身体保持向前运动'},{label:'C',text:'人的重心在前面所以会往前倒'},{label:'D',text:'地面突然变滑了站不稳'}]},
  {dim:'model',text:'🥛 你用吸管喝酸奶，酸奶在吸管里上升。把它推上来的"主力"是：',opts:[{label:'A',text:'嘴巴的吸力'},{label:'B',text:'外界大气压'},{label:'C',text:'吸管里的毛细现象'},{label:'D',text:'酸奶很稀自己流上来的'}]},
  {dim:'model',text:'🔬 小明想测一块不规则石块的密度。他用天平测出石块质量为156g，再将石块放入装有200mL水的量筒中，水面升高到260mL。该石块的密度最接近？',opts:[{label:'A',text:'2.6 g/cm³'},{label:'B',text:'0.6 g/cm³'},{label:'C',text:'7.8 g/cm³'},{label:'D',text:'0.26 g/cm³'}]},
  {dim:'math',text:'🧍 一个质量为50kg的中学生双脚站在水平地面上，每只脚与地面的接触面积约为200cm²。该同学对水平地面的压强约为？（g=10N/kg）',opts:[{label:'A',text:'1.25×10⁴ Pa'},{label:'B',text:'2.5×10⁴ Pa'},{label:'C',text:'1.25×10³ Pa'},{label:'D',text:'2.5×10³ Pa'}]},
  {dim:'math',text:'🏃 体育中考 1000m，小红第一圈 400m 用时 80s。她想用 200s 跑完全程，剩下 600m 需保持平均速度多少 m/s？',opts:[{label:'A',text:'3 m/s'},{label:'B',text:'5 m/s'},{label:'C',text:'6 m/s'},{label:'D',text:'2.5 m/s'}]},

const API_BASE = 'https://physics-diagnosis-mu.vercel.app/api';

async function syncFromGitHub() {
  const btn = $('syncBtn');
  const status = $('syncStatus');
  btn.disabled = true;
  btn.textContent = '⏳ 同步中...';
  status.textContent = '';
  try {
    const res = await fetch(API_BASE + '/list');
    if (!res.ok) { status.textContent = '❌ 同步失败'; btn.disabled = false; btn.textContent = '🔄 同步云端'; return; }
    const result = await res.json();
    let imported = 0;
    if (result.success && result.data) {
      result.data.forEach(item => {
        const nd = normalizeData({ n: item.name, s: item.scores, t: item.type, d: item.date, w: item.weaknesses });
        if (!nd.name || !nd.scores || !nd.type) return;
        if (students.some(s => s.name === nd.name && s.date === nd.date)) return;
        addStudent(nd);
        imported++;
      });
    }
    status.textContent = imported > 0 ? '✅ 新增 ' + imported + ' 条' : '✅ 已是最新';
    if (imported > 0) render();
  } catch (e) { status.textContent = '❌ 同步失败'; }
  btn.disabled = false;
  btn.textContent = '🔄 同步云端';
  setTimeout(() => { if (status.textContent.startsWith('✅')) status.textContent = ''; }, 3000);
}

  const fd=filter==='all'?students:students.filter(s=>s.type===filter);

  $('tCount').textContent=students.length;
  if(students.length){

    $('tAvg').textContent=avg+'分';

function setFilter(f,btn){

function showImport(){$('importModal').classList.add('active');$('codeInput').value='';$('codeInput').focus();$('importAreaDefault').style.display='';$('importSuccess').style.display='none'}
function closeModal(id){$(id).classList.remove('active')}

function normalizeData(raw){
  // 兼容新旧格式：新格式用 {n,s,t,d,w}，旧格式用 {name,scores,type,date,weaknesses}
  const name = raw.n || raw.name;
  let scores = raw.s || raw.scores;
  // scores 可能是数组 [c,m,m2,r,f] 或对象 {concept,model,math,reading,flexible}
  if (Array.isArray(scores)) {
    const obj = {};
    DIMS.forEach((d, i) => { obj[d.key] = scores[i] || 0; });
    scores = obj;
  }
  const type = raw.t || raw.type;
  const date = raw.d || raw.date || new Date().toLocaleDateString('zh-CN');
  // weakness 可能是 [[qi,oi],...]、[[qi,oi,text],...] 或完整对象数组
  let weaknesses = raw.w || raw.weaknesses || [];
  if (Array.isArray(weaknesses) && weaknesses.length && Array.isArray(weaknesses[0])) {
    weaknesses = weaknesses.map(item => {
      const qi = item[0], oi = item[1], weaknessText = item[2] || '';
      const q = QUESTIONS[qi];
      const o = q && q.opts[oi];
      if (!q || !o) return null;
      const dm = DIMS.find(d => d.key === q.dim);
      return {dim: q.dim, label: dm ? dm.label : '', qText: q.text, optLabel: o.label, weakness: weaknessText};
    }).filter(Boolean);
  }
  return {name, scores, type, date, weaknesses};
}

function importCode(){
  const code=$('codeInput').value.trim();
  if(!code)return;
  try{
    const raw=JSON.parse(decodeURIComponent(atob(code)));
    const data=normalizeData(raw);
    if(!data.name||!data.scores||!data.type){alert('分享码格式不正确');return}
    addStudent(data);
    $('importAreaDefault').style.display='none';
    $('importSuccess').style.display='block';
    const t=TYPES[data.type]||{n:'未知',e:'❓'};
    const avg=Math.round(Object.values(data.scores).reduce((a,b)=>a+b,0)/5);
    $('importName').textContent=data.name;
    $('importType').textContent=`${t.e} ${t.n} · 综合 ${avg} 分`;
  }catch(e){alert('分享码无效，请检查是否完整复制')}
}

function addStudent(data){
  const id='s_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
  students.push({id,name:data.name,scores:data.scores,type:data.type,date:data.date,weaknesses:data.weaknesses});
  save();render();
}

function handleFile(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const data=JSON.parse(ev.target.result);
      const arr=Array.isArray(data)?data:[data];
      let cnt=0;
      arr.forEach(d=>{const nd=normalizeData(d);if(nd.name&&nd.scores&&nd.type){addStudent(nd);cnt++}});
      closeModal('importModal');
      alert(`成功导入 ${cnt} 名学生数据`);
    }catch(ex){alert('文件解析失败')}
  };
  reader.readAsText(file);e.target.value='';
}

function exportAll(){
  if(!students.length){alert('没有数据可导出');return}
  const blob=new Blob([JSON.stringify(students,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`物理诊断数据_${new Date().toISOString().slice(0,10)}.json`;
  a.click();URL.revokeObjectURL(url);
}

function importFile(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const data=JSON.parse(ev.target.result);
      const arr=Array.isArray(data)?data:[data];
      let cnt=0;
      arr.forEach(d=>{const nd=normalizeData(d);if(nd.name&&nd.scores&&nd.type){addStudent(nd);cnt++}});
      alert(`成功导入 ${cnt} 名学生数据`);
    }catch(ex){alert('文件解析失败')}
  };
  reader.readAsText(file);e.target.value='';
}

function delSt(id){
  if(!confirm('确定删除该学生？'))return;
  students=students.filter(s=>s.id!==id);save();render();
}

function showReport(id){
  const s=students.find(st=>st.id===id);if(!s)return;
  const t=TYPES[s.type]||{n:'未知',e:'❓',c:'#A0AEC0'};
  const te=TD[s.type];if(!te)return;
  const sc=s.scores;const avg=Math.round(Object.values(sc).reduce((a,b)=>a+b,0)/5);
  document.title = s.name + ' · 物理诊断报告 - 高途课堂';
  $('reportTitle').innerHTML=`${t.e} ${s.name} · ${t.n}（综合 ${avg} 分）`;

  const dimTags = DIMS.map(d => {
    const lvl = sc[d.key] >= 70 ? '优势' : (sc[d.key] >= 45 ? '中等' : '薄弱');
    return '<span class="dt" style="background:' + d.color + '">' + d.icon + ' ' + d.label + ' ' + sc[d.key] + '分</span>';
  }).join('');

  const bars = DIMS.map(d => {
    const lvl = sc[d.key] >= 70 ? '优势' : (sc[d.key] >= 45 ? '中等' : '薄弱');
    const lc = sc[d.key] >= 70 ? '#48BB78' : (sc[d.key] >= 45 ? '#ED8936' : '#FC8181');
    return '<div class="di"><div class="di-h"><span class="di-label">' + d.icon + ' ' + d.label + '</span><span class="di-val">' + sc[d.key] + '分 <span class="di-lvl" style="background:' + lc + '15;color:' + lc + '">' + lvl + '</span></span></div><div class="di-b"><div class="di-f" style="width:' + sc[d.key] + '%;background:' + d.color + '"></div></div></div>';
  }).join('');

  let wt = '';
  if (s.weaknesses && s.weaknesses.length) {
    wt = '<div class="wt-wrap"><table class="wt"><thead><tr><th style="width:13%">维度</th><th style="width:40%">题目</th><th>能力缺失分析</th></tr></thead><tbody>' +
      s.weaknesses.map(w => {
        const dm = DIMS.find(dd => dd.key === w.dim);
        const c = dm ? dm.color : '#A0AEC0';
        const weaknessDisplay = w.weakness ? '<div class="wb">' + w.weakness + '</div>' : '<div class="wb" style="color:#A0AEC0;font-style:italic">（详细分析见学生端报告）</div>';
        return '<tr><td><span class="badge" style="background:' + c + '">' + (dm ? dm.icon : '') + ' ' + (w.label || w.dim) + '</span></td><td><div class="qt2">' + (w.qText || '') + '</div><div class="qt-wrong">✘ 选了 ' + (w.optLabel || '') + '</div></td><td>' + weaknessDisplay + '</td></tr>';
      }).join('') + '</tbody></table></div>';
  } else {
    wt = '<div class="wt-empty">✅ 该生全部答对或未记录错题数据</div>';
  }

  const plans = te.pl ? te.pl.map(p => '<div class="pi" style="border-left-color:' + p.c + '"><h5>' + p.t + '</h5><p>' + p.d + '</p></div>').join('') : '';

  $('reportBody').innerHTML = '<div class="report-inner">' +
    '<div class="report-header"><div class="rh-name">' + t.e + ' ' + s.name + '</div><div class="rh-meta"><span class="rh-type">' + t.n + '（' + s.type + '型）</span>' + s.date + '</div><div class="rh-score"><span>' + avg + '</span>综合得分</div></div>' +
    '<div class="rs"><h4>📊 五维度解读</h4><div class="dim-tags">' + dimTags + '</div><div class="di-group">' + bars + '</div></div>' +
    '<div class="rs"><h4>📋 诊断概述</h4><div class="rs-body"><p>' + te.o + '</p></div></div>' +
    '<div class="rs"><h4>🔍 力学能力诊断</h4>' + wt + '</div>' +
    '<div class="rs"><h4>🧠 学习方式画像</h4><div class="rs-body"><p>' + te.p + '</p></div></div>' +
    '<div class="rs"><h4>⚡ 电学学习预判</h4><div class="rs-body"><p>' + te.e + '</p></div><div class="warn-box"><div class="wtt">⚠️ 需要关注</div><p>' + te.w + '</p></div></div>' +
    '<div class="rs"><h4>📅 教学培养方案</h4><div class="pg2">' + plans + '</div></div>' +
    '<div class="rs"><h4>💬 家校共育建议</h4><div class="rs-body"><p>' + te.pa + '</p></div></div>' +
    '<div class="act-bar-report"><button class="btn btn-primary btn-sm" onclick="window.print()">🖨️ 打印报告</button> <button class="btn btn-ghost btn-sm" onclick="closeModal(\'reportModal\')">关闭</button></div>' +
  '</div>';
  $('reportModal').classList.add('active');
}

document.querySelectorAll('.modal-overlay').forEach(el=>{el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('active')})});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){document.querySelectorAll('.modal-overlay.active').forEach(m=>m.classList.remove('active'))}});
render(); setTimeout(()=>syncFromGitHub(), 500);
</script>
</body>
</html>
